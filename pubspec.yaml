name: home_guard_ai
description: "AI-Powered Home Maintenance Assistant - Standalone & Local-First"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  objectbox: ^2.4.0
  objectbox_flutter_libs: ^2.4.0
  path_provider: ^2.1.2
  path: ^1.8.3
  image_picker: ^1.0.7
  google_ml_kit: ^0.18.0
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  intl: ^0.19.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  objectbox_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/data/
